<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Résidence - Contact</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <div class="container">
        <div id="nav-placeholder"></div>

        <main class="main-content">
            <h2 class="page-title">Contactez-nous</h2>

            <div class="content-wrapper">
                <p>Notre équipe reste à votre disposition pour toute demande d'information, visite ou réservation.</p>
                <br>
                <p><strong>Téléphone :</strong> 021 730 40 40</p>
                <p><strong>Email :</strong> <a href="mailto:info@laresidence.ch" style="color: var(--color-gold);">info@laresidence.ch</a></p>
                <p><strong>Adresse :</strong> — à compléter —</p>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <input type="text" placeholder="Votre Nom" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Votre Email" required>
                </div>
                <div class="form-group">
                    <textarea rows="5" placeholder="Votre Message" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Envoyer</button>
            </form>
        </main>
    </div>

    <script src="../assets/js/nav.js"></script>
    <script src="../assets/js/main.js"></script>
</body>

</html>
